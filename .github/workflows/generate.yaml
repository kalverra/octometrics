name: Generate
on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    branches:
      - main

jobs:
  generate:
    name: Generate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install Dependencies
        run: go mod download
      - name: Generate
        run: go generate ./...
      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Sign the commit
        with:
          commit_message: "chore: auto-update generated files"
          file_pattern: "**/*.go"
